# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################



# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
source = ~/.config/hypr/colors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=DP-2,2560x1440@99.95,0x0,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = nautilus --new-window
$menu = ~/.config/rofi/launch-drun.sh


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &

# Quickshell (ii) - notification daemon + UI (запускается первым для захвата org.freedesktop.Notifications)
exec-once = bash -lc 'sleep 2 && pkill -x swaync >/dev/null 2>&1 || true; sleep 1 && qs -c ii'

exec-once = bash -lc 'command -v waybar >/dev/null && waybar'
exec-once = bash -lc 'command -v awww-daemon >/dev/null && awww-daemon &'
exec-once = bash -lc 'command -v awww >/dev/null && sleep 4 && awww restore'
exec-once = bash -lc 'command -v wl-paste >/dev/null && command -v cliphist >/dev/null && wl-paste --type text --watch cliphist store'
exec-once = bash -lc 'command -v wl-paste >/dev/null && command -v cliphist >/dev/null && wl-paste --type image --watch cliphist store'
exec-once = bash -lc 'command -v rofi-polkit-agent >/dev/null && rofi-polkit-agent -theme "$HOME/.config/rofi/polkit.rasi"'
exec-once = bash -lc 'command -v hyprcursor && hyprcursor -s $HYPRCURSOR_THEME/$HYPRCURSOR_SIZE'
exec-once = hyprpm reload
exec-once = v2rayn

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/
# Используем hyprcursor для Wayland (XCURSOR оставлен для XWayland-приложений)

env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 4

    border_size = 1

    # Material dynamic borders from matugen (~/.config/hypr/colors.conf)
    col.active_border = rgba($active_border)
    col.inactive_border = rgba($inactive_border)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 12
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.96

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 10
        passes = 2
        ignore_opacity = true
        xray = false

        vibrancy = 0.18
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
# name "Standard" - credit https://github.com/mylinuxforwork/dotfiles
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:ctrl_space_toggle
    kb_rules =

    follow_mouse = 1
    accel_profile = adaptive
    sensitivity = -0.10 # softer pointer feel
    scroll_factor = 0.75 # globally slower scroll steps

    touchpad {
        natural_scroll = true
        scroll_factor = 0.75
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Per-device mouse tuning
device {
    name = steelseries-steelseries-rival-3
    scroll_factor = 0.75
    sensitivity = -0.10
}

device {
    name = rdmctmzt-wireless-2.4g-dongle-mouse
    scroll_factor = 0.75
    sensitivity = -0.10
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, T, exec, env QT_QPA_PLATFORM=xcb /usr/bin/Telegram
bind = $mainMod, RETURN, exec, $terminal
bind = CTRL, Q, killactive
bind = $mainMod, N, exec, qs -c ii ipc call controlCenter toggle
bind = $mainMod, E, exec, nautilus
bind = $mainMod SHIFT, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = ALT, SPACE, exec, ~/.config/rofi/launch-drun.sh
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -i -p 'Clipboard' -theme ~/.config/rofi/launchers/type-1/style-1.rasi | cliphist decode | wl-copy
bind = $mainMod SHIFT, C, exec, cliphist wipe
bind = $mainMod, I, exec, ~/.config/waybar/scripts/colorpicker.sh
bind = $mainMod SHIFT, W, exec, ~/.config/waybar/scripts/wallpaper-picker.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window inside current workspace (tiling)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize tiled window
bind = $mainMod CTRL, left, resizeactive, -80 0
bind = $mainMod CTRL, right, resizeactive, 80 0
bind = $mainMod CTRL, up, resizeactive, 0 -80
bind = $mainMod CTRL, down, resizeactive, 0 80

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, exec, hyprshot -m region

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Waybar blur rules
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.2, match:namespace waybar
blurls = waybar

# Wofi blur disabled (for solid launcher look)
# layerrule = blur on, match:namespace wofi
# layerrule = ignore_alpha 0.2, match:namespace wofi
# blurls = wofi

# SwayNC blur disabled (solid control center)
# (no layerrule blur / blurls entries for swaync)

# Keep Kitty fully opaque for readability
windowrule {
    name = kitty-opacity
    match:class = ^(kitty)$

    opacity = 1.0 1.0
}

# File manager always floating
windowrule {
    name = float-file-manager
    match:class = ^(org\.gnome\.Nautilus|nautilus|nemo|Nemo)$

    float = yes
    size = 72% 66%
    move = 14% 32%
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Dropdown file manager rules
windowrule {
    name = file-manager-float
    match:class = ^(org\.gnome\.Nautilus|nautilus|nemo|Nemo)$

    float = yes
    size = 90% 85%
    move = 5% 10%
    animation = slide bottom
}

# GNOME Sushi / Quick Look preview
windowrule {
    name = sushi-float
    match:class = ^(org\.gnome\.NautilusPreviewer|sushi)$

    float = yes
    size = 70% 70%
    center = yes
}

# Image viewer (imv) always floating
windowrule {
    name = imv-float
    match:class = ^(imv|imv-wayland|imv-x11)$

    float = yes
    size = 70% 80%
    center = yes
}

exec-once = hypridle

# Polkit auth dialogs (keep as normal floating popup, never fullscreen)
windowrule {
    name = polkit-float
    match:class = ^(polkit-gnome-authentication-agent-1|polkit-gnome-authentication-agent|org\.gnome\.Polkit.*)$

    float = yes
    center = yes
    size = 36% 28%
}

windowrule {
    name = polkit-float-by-title
    match:title = ^(Authentication Required|Authentication required|Требуется подтверждение пользователя|Требуется аутентификация).*$

    float = yes
    center = yes
    size = 36% 28%
}

# Dynamic cursors plugin
plugin:dynamic-cursors {
    enabled = true
    scale = 1.5
    speed_threshold = 0.3
    fade_speed = 4.0
}
